<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rosetta favicon: purple→blue gradient rounded-square tile with a
       white bulb glyph, mirroring the brand badge used in Sidebar.tsx
       (and Login.tsx / Home.tsx). Swap replaces an older lightning
       lightning-bolt favicon so the tab icon matches the in-app brand. -->
  <defs>
    <linearGradient id="rosettaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8243EA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Rounded tile -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#rosettaBg)"/>
  <!-- Bulb glyph — same four strokes as the 24×24 sidebar icon, scaled
       ×2 and translated so it sits centered in the 64×64 tile. -->
  <g transform="translate(8 6)"
     fill="none"
     stroke="#ffffff"
     stroke-width="3.2"
     stroke-linecap="round"
     stroke-linejoin="round">
    <!-- Bulb outer silhouette -->
    <path d="M24 4 a12 12 0 0 0 -8 21 V30 h16 V25 a12 12 0 0 0 -8 -21 z"/>
    <!-- Filament marker inside the bulb -->
    <path d="M24 12 v6" opacity="0.85"/>
    <!-- Base rings under the bulb -->
    <path d="M18 36 h12"/>
    <path d="M20 44 h8"/>
  </g>
</svg>
